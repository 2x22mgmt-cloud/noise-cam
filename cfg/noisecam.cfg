// =============================================================================
//  noisecam.cfg — one-shot loader for Noise Cam
// =============================================================================
//  Loads the in-game bridge AND sets up the keypad binds, so you never have to
//  type the long mirv_script_load path again.
//
//  This file is auto-deployed to your CS2 cfg folder:
//    D:\SteamLibrary\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\noisecam.cfg
//
//  THREE ways to use it (pick one):
//    1) Zero typing — in HLAE's CS2 launch parameters, add:   +exec noisecam
//       (bridge auto-loads every time you launch CS2 via HLAE)
//    2) One command  — in the CS2 console each session:        exec noisecam
//    3) One key      — it binds F8 below to re-run itself:     press F8
// =============================================================================

// --- load the bridge (dials out to the Noise Cam overlay's relay on :31337) ---
mirv_script_load "D:\Projects\cs2-dolly\bridge\noisecam-bridge.js"

// --- re-load on a key, handy after reconnecting / reopening the overlay -------
bind "F8" "exec noisecam"

// --- keypad binds (same as cfg/dolly.cfg) — call the mirv_dolly command -------
bind "KP_PLUS"      "mirv_dolly capture"   // Numpad +     drop a keyframe
bind "KP_MINUS"     "mirv_dolly clear"     // Numpad -     clear all keyframes
bind "KP_ENTER"     "mirv_dolly enable"    // Numpad Enter enable the path
bind "KP_DEL"       "mirv_dolly disable"   // Numpad .     disable the path
bind "KP_MULTIPLY"  "mirv_dolly draw"      // Numpad *     show path in-game
bind "KP_DIVIDE"    "mirv_dolly drawoff"   // Numpad /     hide path
bind "KP_HOME"      "demo_togglepause"     // Numpad 7     pause/resume the demo

echo "Noise Cam bridge loaded — open the overlay (Alt+Shift+D) and the dot turns green."
