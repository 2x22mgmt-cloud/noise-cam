// =============================================================================
//  CS2 Dolly — starter binds (optional convenience)
// =============================================================================
//  These let you build a campath while flying the freecam, without alt-tabbing.
//  They call the `mirv_dolly` command registered by dolly-bridge.js.
//
//  To use: copy this file to your CS2 cfg folder, e.g.
//    C:\Program Files (x86)\Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\dolly.cfg
//  then in the CS2 console:  exec dolly
//  (Or just paste the binds you want straight into the console.)
//
//  Numpad keys are used so they don't clash with your gameplay binds — edit freely.
// =============================================================================

bind "KP_PLUS"      "mirv_dolly capture"   // Numpad +     drop a keyframe at current view + time
bind "KP_MINUS"     "mirv_dolly clear"     // Numpad -     clear all keyframes
bind "KP_ENTER"     "mirv_dolly enable"    // Numpad Enter enable the path
bind "KP_DEL"       "mirv_dolly disable"   // Numpad .     disable the path
bind "KP_MULTIPLY"  "mirv_dolly draw"      // Numpad *     show path in-game
bind "KP_DIVIDE"    "mirv_dolly drawoff"   // Numpad /     hide path

// Handy for composing keyframes at different times (HLAE / CS2 demo control):
bind "KP_HOME"      "demo_togglepause"     // Numpad 7     pause/resume the demo

echo "CS2 Dolly binds loaded: KP+ capture | KP- clear | KPenter enable | KP. disable | KP* draw | KP/ drawoff | KP7 pause"
